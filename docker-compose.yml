services:
  trojan:
    image: trojangfw/trojan:latest
    container_name: trojan-server
    restart: unless-stopped
    depends_on:
      - fallback
    ports:
      - "443:443"
    volumes:
      - ./config/config.json:/config/config.json:ro
      - ./certs:/certs:ro
    command:
      - trojan
      - -c
      - /config/config.json

  fallback:
    image: nginx:alpine
    container_name: trojan-fallback
    restart: unless-stopped
    volumes:
      - ./www:/usr/share/nginx/html:ro
